<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EyeTrack Reader</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="popup">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <span class="logo-icon">👁️</span>
                <span class="logo-text">EyeTrack<span class="accent">Reader</span></span>
            </div>
        </header>

        <!-- Status Section -->
        <section class="status-section">
            <div class="status-card" id="status-card">
                <div class="status-indicator" id="status-indicator">
                    <span class="status-dot"></span>
                    <span class="status-text" id="status-text">Off</span>
                </div>
                <button class="power-btn" id="power-btn" title="Toggle Eye Tracking">
                    <span>⏻</span>
                </button>
            </div>
        </section>

        <!-- Calibration Status -->
        <section class="calibration-section">
            <div class="calibration-status" id="calibration-status">
                <span class="calibration-icon">🎯</span>
                <div class="calibration-info">
                    <span class="calibration-label">Calibration</span>
                    <span class="calibration-value" id="calibration-value">Not calibrated</span>
                </div>
                <button class="btn-small" id="calibrate-btn">Calibrate</button>
            </div>
        </section>

        <!-- Quick Settings -->
        <section class="settings-section">
            <h3 class="section-title">Quick Settings</h3>
            
            <div class="setting-row">
                <span class="setting-label">Auto-Scroll</span>
                <div class="toggle" id="toggle-autoscroll">
                    <div class="toggle-track">
                        <div class="toggle-thumb"></div>
                    </div>
                </div>
            </div>

            <div class="setting-row">
                <span class="setting-label">Show Gaze</span>
                <div class="toggle" id="toggle-gaze">
                    <div class="toggle-track">
                        <div class="toggle-thumb"></div>
                    </div>
                </div>
            </div>

            <div class="setting-row">
                <span class="setting-label">Scroll Speed</span>
                <div class="slider-container">
                    <input type="range" class="slider" id="scroll-speed" min="1" max="10" value="5">
                    <span class="slider-value" id="speed-value">5</span>
                </div>
            </div>

            <div class="setting-row">
                <span class="setting-label">Sensitivity</span>
                <div class="slider-container">
                    <input type="range" class="slider" id="sensitivity" min="10" max="30" value="20">
                    <span class="slider-value" id="sensitivity-value">20%</span>
                </div>
            </div>
        </section>

        <!-- Footer -->
        <footer class="footer">
            <a href="#" class="footer-link" id="open-webapp">Open Web App</a>
            <span class="footer-divider">•</span>
            <a href="#" class="footer-link" id="open-help">Help</a>
        </footer>
    </div>

    <script src="popup.js"></script>
</body>
</html>
